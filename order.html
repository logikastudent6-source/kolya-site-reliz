<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sotren - Order</title>
    <link rel="stylesheet" href="order.css">
</head>
<body>
    <h1>List of Fast food:</h1>
    <p>18$ Pizza (Margherita, Pepperoni, Neapolitan)</p>
    <p>7$, 5$, 3$ Fries (75, 50, 25)</p>
    <p>5$, 4$, 3$ Nuggets (15, 10, 5)</p>
    <p>2$, 3$, 3$ Drinks(Water, Pepsi, Coco-Cola)</p>
    <form class="input-order">
    <input required class="textbox" placeholder="Your name and surname" rows="1" cols="25"></input>  
    <input required class="textbox" placeholder="Phone number" rows="1" cols="25"></input>
    <input required class="textbox" placeholder="Your order" rows="1" cols="25"></input>
    <button type="submit" class="button">Order</button></form>
</body>
</html>
