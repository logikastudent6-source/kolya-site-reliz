<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sotren - Ordering</title>
    <link rel="stylesheet" href="order.css">
</head>
<body>
    <header>
        <div class="logo">Sotren</div>
        <nav><ul>
            <li><a href="index.html">Catalog</a></li>
            <li><a href="order.html">Order</a></li>
        </ul></nav>    
    </header>
    <div class="order-container">
        <div class="order-list">
            <h2>List of Fast food:</h1>
            <p>18$ Pizza Margherita</p>
            <p>5$ Medium Fries (50g)</p>
            <p>Small 3$ Nuggets (5g)</p>
            <p>3$ Coco-Cola</p>
            <p>3$ Burger</p>
        </div>
        <form class="input-order">
        <input required class="textbox" placeholder="Your name and surname" rows="1" cols="25"></input>  
        <input required class="textbox" placeholder="Phone number" rows="1" cols="25"></input>
        <input required class="textbox" placeholder="Your adress" rows="1" cols="25"></input>
        <a href="finish.html" class="button">Order right now</a>
        </form>
    </div>
</body>
</html>
